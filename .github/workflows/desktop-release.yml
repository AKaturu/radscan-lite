name: Desktop release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows
            os: windows-latest
            artifact: radscan-lite-windows
          - platform: linux
            os: ubuntu-latest
            artifact: radscan-lite-linux
          - platform: macos
            os: macos-15
            artifact: radscan-lite-macos

    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build Windows executable
        if: matrix.platform == 'windows'
        shell: cmd
        run: packaging\build_windows.bat

      - name: Build Linux executable
        if: matrix.platform == 'linux'
        run: bash packaging/build_linux.sh

      - name: Build macOS app
        if: matrix.platform == 'macos'
        run: bash packaging/build_macos.sh

      - name: Smoke test Windows launcher
        if: matrix.platform == 'windows'
        shell: pwsh
        run: .\dist\RadScanLite.exe --self-check

      - name: Smoke test Linux launcher
        if: matrix.platform == 'linux'
        run: ./dist/RadScanLite --self-check

      - name: Smoke test macOS launcher
        if: matrix.platform == 'macos'
        run: ./dist/RadScanLite.app/Contents/MacOS/RadScanLite --self-check

      - name: Package Windows artifact
        if: matrix.platform == 'windows'
        shell: pwsh
        run: Compress-Archive -Path dist/RadScanLite.exe -DestinationPath dist/${{ matrix.artifact }}.zip

      - name: Package Linux artifact
        if: matrix.platform == 'linux'
        run: tar -czf dist/${{ matrix.artifact }}.tar.gz -C dist RadScanLite

      - name: Package macOS artifact
        if: matrix.platform == 'macos'
        run: hdiutil create -volname RadScanLite -srcfolder dist/RadScanLite.app -ov -format UDZO dist/${{ matrix.artifact }}.dmg

      - name: Generate artifact checksum
        shell: bash
        run: |
          set -euo pipefail
          cd dist
          if [ -f "${{ matrix.artifact }}.zip" ]; then
            sha256sum "${{ matrix.artifact }}.zip" > "${{ matrix.artifact }}.zip.sha256"
          elif [ -f "${{ matrix.artifact }}.tar.gz" ]; then
            sha256sum "${{ matrix.artifact }}.tar.gz" > "${{ matrix.artifact }}.tar.gz.sha256"
          elif [ -f "${{ matrix.artifact }}.dmg" ]; then
            sha256sum "${{ matrix.artifact }}.dmg" > "${{ matrix.artifact }}.dmg.sha256"
          else
            echo "No release archive found for ${{ matrix.artifact }}" >&2
            exit 1
          fi

      - name: Upload Windows artifact
        if: matrix.platform == 'windows'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            dist/${{ matrix.artifact }}.zip
            dist/${{ matrix.artifact }}.zip.sha256

      - name: Upload Linux artifact
        if: matrix.platform == 'linux'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            dist/${{ matrix.artifact }}.tar.gz
            dist/${{ matrix.artifact }}.tar.gz.sha256

      - name: Upload macOS artifact
        if: matrix.platform == 'macos'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            dist/${{ matrix.artifact }}.dmg
            dist/${{ matrix.artifact }}.dmg.sha256
